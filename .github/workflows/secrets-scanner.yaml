name: Secrets & PII Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Scan for secrets and PII
        run: |
          npx ts-node scripts/detect-secrets.ts
      
      - name: Check layout complexity before push
        run: |
          npx ts-node scripts/check-layout-complexity.ts
