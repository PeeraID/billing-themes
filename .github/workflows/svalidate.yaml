name: Validate Layout Artifacts

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate-layout-schema:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Validate layout artifacts against schema
        run: |
          npx json-schema-resolver --schema-file=./schemas/*.json ./designs/tenants/ 2>&1 || true
          npx ajv compile -c schemas/*.json 2>&1 || true
      
      - name: Run layout complexity checks
        run: |
          npm run validate:complexity || true
      
      - name: Validate path guard compliance
        run: |
          node scripts/enforce-path-guard.ts || true
